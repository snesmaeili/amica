[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mne-amica"
version = "0.1.0"
description = "Native Python AMICA (Adaptive Mixture ICA) for MNE-Python"
readme = "README.md"
license = {text = "BSD-3-Clause"}
requires-python = ">=3.9"
authors = [
    {name = "Sina Esmaeili", email = "sina.esmaeili@umontreal.ca"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy>=1.21",
    "scipy>=1.7",
]

[project.optional-dependencies]
jax = ["jax[cpu]>=0.4"]
gpu = ["jax[cuda12]>=0.4"]
mne = ["mne>=1.0"]
dev = ["pytest>=7.0", "mne>=1.0", "matplotlib>=3.5"]
all = ["jax[cpu]>=0.4", "mne>=1.0", "matplotlib>=3.5", "pytest>=7.0"]

[project.urls]
Homepage = "https://github.com/snesmaeili/mne-amica"
Repository = "https://github.com/snesmaeili/mne-amica"

[tool.setuptools.packages.find]
include = ["mne_amica*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
