name: Tests

on:
  push:
    branches: [main, production-ready-amica]
  pull_request:
    branches: [main, production-ready-amica]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        backend: ["jax", "numpy"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          if [ "${{ matrix.backend }}" == "jax" ]; then
            uv pip install -e ".[mne,jax]" --group test --system
          else
            uv pip install -e ".[mne]" --group test --system
          fi

      - name: Run tests
        env:
          AMICA_NO_JAX: ${{ matrix.backend == 'numpy' && '1' || '0' }}
        run: |
          python -m pytest tests/ -v --tb=short --cov=amica_python --cov-report=xml -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: true
