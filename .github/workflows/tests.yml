name: Tests

on:
  push:
    branches: [main, production-ready-amica, ci-tests-improvements]
  pull_request:
    branches: [main, production-ready-amica, ci-tests-improvements]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # JAX (CPU/GPU) tests are excluded from CI — they require billing-grade
    # runners or self-hosted GPU hardware. Run locally with:
    #   pytest tests/ --backend=cpu   (JAX-CPU)
    #   pytest tests/ --backend=gpu   (JAX-GPU, requires CUDA)
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install -e ".[mne]" --group test --system

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --backend=numpy --cov=amica_python --cov-report=xml -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: true
