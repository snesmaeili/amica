name: Tests

on:
  push:
    branches: [main, production-ready-amica, ci-tests-improvements]
  pull_request:
    branches: [main, production-ready-amica, ci-tests-improvements]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # JAX-GPU tests require a self-hosted GPU runner and are run locally only.
    # JAX-CPU runs on ubuntu-latest (Python 3.12 only to limit CI minutes).
    # GPU tests: pytest tests/ --backend=gpu  (requires CUDA, run locally)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        backend: ["numpy"]
        include:
          - python-version: "3.12"
            backend: "jax-cpu"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          if [ "${{ matrix.backend }}" == "jax-cpu" ]; then
            uv pip install -e ".[mne,jax]" --group test --system
          else
            uv pip install -e ".[mne]" --group test --system
          fi

      - name: Run tests
        run: |
          if [ "${{ matrix.backend }}" == "jax-cpu" ]; then
            python -m pytest tests/ -v --tb=short --backend=cpu --cov=amica_python --cov-report=xml -n auto
          else
            python -m pytest tests/ -v --tb=short --backend=numpy --cov=amica_python --cov-report=xml -n auto
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: true
