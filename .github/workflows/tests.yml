name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # JAX-GPU tests require a self-hosted GPU runner and are run locally only.
    # JAX-CPU runs on all OSes (Python 3.12 only to limit CI minutes).
    # GPU tests: pytest tests/ --backend=gpu  (requires CUDA, run locally)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        backend: ["numpy"]
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            backend: "jax-cpu"
          - os: macos-latest
            python-version: "3.12"
            backend: "jax-cpu"
          - os: windows-latest
            python-version: "3.12"
            backend: "jax-cpu"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ matrix.backend }}" == "jax-cpu" ]; then
            uv pip install -e ".[mne,jax,test,viz,icalabel]" --system
          else
            uv pip install -e ".[mne,test,viz,icalabel]" --system
          fi

      - name: Run tests
        shell: bash
        env:
          MPLBACKEND: Agg
        run: |
          if [ "${{ matrix.backend }}" == "jax-cpu" ]; then
            python -m pytest tests/ -v --tb=short --backend=cpu --cov=amica --cov-report=xml -n auto
          else
            python -m pytest tests/ -v --tb=short --backend=numpy --cov=amica --cov-report=xml -n auto
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: true
