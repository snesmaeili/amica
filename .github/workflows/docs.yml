name: Docs

on:
  push:
    branches:
      - main
      - production-ready-amica
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install sphinx pydata-sphinx-theme sphinx-gallery numpydoc myst-parser

      - name: Build docs
        run: |
          cd docs
          make html
